server.servlet.context-path=/api

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/mentorlink?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:yourpassword}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

springdoc.api-docs.enabled=${APP_SWAGGER_ENABLED:false}
springdoc.swagger-ui.enabled=${APP_SWAGGER_ENABLED:false}
springdoc.swagger-ui.path=/swagger-ui.html

app.jwt.secret=${APP_JWT_SECRET}
app.jwt.expiration-millis=${APP_JWT_EXPIRATION_MILLIS:86400000}
app.email.verification-expiration-minutes=${APP_EMAIL_VERIFICATION_EXPIRATION_MINUTES:10}
app.email.debug-fallback=${APP_EMAIL_DEBUG_FALLBACK:false}
app.swagger.enabled=${APP_SWAGGER_ENABLED:false}
app.mock-data.enabled=${APP_MOCK_DATA_ENABLED:false}
app.auth.login-rate-limit.max-attempts=${APP_AUTH_LOGIN_RATE_LIMIT_MAX_ATTEMPTS:5}
app.auth.login-rate-limit.window-minutes=${APP_AUTH_LOGIN_RATE_LIMIT_WINDOW_MINUTES:10}
app.auth.email-send-rate-limit.max-attempts=${APP_AUTH_EMAIL_SEND_RATE_LIMIT_MAX_ATTEMPTS:5}
app.auth.email-send-rate-limit.window-minutes=${APP_AUTH_EMAIL_SEND_RATE_LIMIT_WINDOW_MINUTES:10}
app.auth.refresh-token.expiration-days=${APP_AUTH_REFRESH_TOKEN_EXPIRATION_DAYS:14}
app.auth.refresh-token.secure=${APP_AUTH_REFRESH_TOKEN_SECURE:false}

spring.mail.host=${MAIL_HOST:}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_SMTP_STARTTLS_ENABLE:true}
spring.mail.properties.mail.smtp.starttls.required=${MAIL_SMTP_STARTTLS_REQUIRED:true}
spring.mail.properties.mail.smtp.ssl.trust=${MAIL_SMTP_SSL_TRUST:}
spring.mail.properties.mail.smtp.ssl.protocols=${MAIL_SMTP_SSL_PROTOCOLS:TLSv1.2}
spring.mail.properties.mail.smtp.connectiontimeout=${MAIL_SMTP_CONNECTION_TIMEOUT:5000}
spring.mail.properties.mail.smtp.timeout=${MAIL_SMTP_TIMEOUT:5000}
spring.mail.properties.mail.smtp.writetimeout=${MAIL_SMTP_WRITE_TIMEOUT:5000}
spring.mail.properties.mail.debug=${MAIL_DEBUG:false}

logging.level.org.springframework.mail=${MAIL_LOG_LEVEL:INFO}
logging.level.org.eclipse.angus.mail=${MAIL_LOG_LEVEL:INFO}
logging.level.jakarta.mail=${MAIL_LOG_LEVEL:INFO}
